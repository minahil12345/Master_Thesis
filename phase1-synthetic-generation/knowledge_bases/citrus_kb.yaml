  spatial_prior_mask_paths:
  - path: knowledge_bases/masks/citrus/deform_side.png
    region_name: side wall
  - path: knowledge_bases/masks/citrus/deform_surface.png
    region_name: surface
  - path: knowledge_bases/masks/citrus/deform_pole.png
    region_name: pole area
  forbidden_region_masks: []
  colour_hsv:
    hue_min: 0
    hue_max: 180
    sat_min: 10
    sat_max: 255
    val_min: 10
    val_max: 255
  shape:
    min_area: 500
    max_area: 150000
    min_aspect_ratio: 0.2
    max_aspect_ratio: 5.0
  prompt_template: An orange with a visible dent and shape deformation on the {location}.
    The fruit surface has a flat, indented area with subtle shadowing, creating an
    asymmetrical contour. The rind follows the depression, giving a misshapen appearance.
    Studio lighting to emphasize depth and texture.