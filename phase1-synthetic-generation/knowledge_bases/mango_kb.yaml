bruise:
  description: Impact bruise - brown to black discoloration from mechanical damage,
    flesh breakdown beneath skin
  spatial_prior_mask_paths:
  - path: knowledge_bases/masks/mango/bruise_cheek.png
    region_name: cheek
  - path: knowledge_bases/masks/mango/bruise_shoulder.png
    region_name: shoulder
  - path: knowledge_bases/masks/mango/bruise_belly.png
    region_name: belly area
  forbidden_region_masks: []
  colour_hsv:
    hue_min: 0
    hue_max: 180
    sat_min: 10
    sat_max: 255
    val_min: 10
    val_max: 255
  shape:
    min_area: 500
    max_area: 150000
    min_aspect_ratio: 0.2
    max_aspect_ratio: 5.0
  prompt_template: A ripe yellow mango with a prominent brown impact bruise on the
    {location}. The bruise is a dark brown, slightly depressed area with soft, collapsed
    tissue beneath the skin, contrasting sharply with the smooth yellow peel. The
    damaged region has a dull, matte appearance. Natural tropical light, macro detail,
    realistic post-harvest defect.

fungal_infection:
