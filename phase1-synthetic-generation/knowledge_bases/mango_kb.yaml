  colour_hsv:
    hue_min: 0
    hue_max: 180
    sat_min: 10
    sat_max: 255
    val_min: 10
    val_max: 255
  shape:
    min_area: 500
    max_area: 150000
    min_aspect_ratio: 0.2
    max_aspect_ratio: 5.0
